<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healthcare — iShare</title>
  <link rel="icon" type="image/svg+xml" href="img/isharefavicon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&display=swap" rel="stylesheet">

  <!-- CSS split -->
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/typography.css">
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/sections/hero.css">
  <link rel="stylesheet" href="css/sections/spacer.css">
  <link rel="stylesheet" href="css/sections/sec2.css">
  <link rel="stylesheet" href="css/sections/sec3.css">
  <link rel="stylesheet" href="css/sections/footer.css">

  <!-- healthcare page responsive styles -->
  <style>
    #healthcare-hero {
      min-height: 60vh;
      display: flex;
      align-items: center;
      padding: 40px 20px;
      position: relative;
    }

    #healthcare-hero .container {
      width: 100%;
      color: #fff;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    #healthcare-hero h1 {
      margin-bottom: 20px;
    }

    #healthcare-hero p {
      max-width: 600px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      #healthcare-hero {
        min-height: auto;
        padding: 60px 20px;
      }

      #healthcare-hero h1 {
        font-size: clamp(32px, 5vw, 48px);
        margin-bottom: 16px;
      }

      #healthcare-hero p {
        font-size: 16px;
        line-height: 1.5;
        margin-bottom: 24px;
      }
    }

    @media (max-width: 520px) {
      #healthcare-hero {
        padding: 40px 16px;
      }

      #healthcare-hero h1 {
        font-size: clamp(28px, 4vw, 40px);
        margin-bottom: 12px;
      }

      #healthcare-hero p {
        font-size: 14px;
        margin-bottom: 20px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <!-- =========================
       MAIN CONTENT
       ========================= -->

  <main>

    <!-- Education Category Hero Section -->
    <section id="healthcare-hero" style="background: #ff6b4a;">
      <div class="container">
        <h1 class="typo-hero">Education Solutions</h1>
        <p class="typo-body">
          Transform healthcare communication through immersive virtual environments. Help donors and stakeholders visualize the impact of medical initiatives and facility improvements.
        </p>
        <button class="btn btn-primary" type="button">Explore Projects</button>
      </div>
    </section>

    <!-- Projects Gallery Section (sec3 style) -->
    <section id="healthcare-projects" class="sec3">
      <div class="sec3-inner">
        <h2 class="sec3-title typo-hero">Featured Healthcare Projects</h2>

        <div class="sec3-grid" role="list">
          <!-- Project Card 1: Hospital Wing -->
          <a class="campaign-card tone-1" href="#" role="listitem">
            <div class="campaign-media" aria-hidden="true"></div>
            <span class="campaign-label typo-util">Hospital Wing Renovation</span>
          </a>

          <!-- Project Card 2: Research Lab -->
          <a class="campaign-card tone-2" href="#" role="listitem">
            <div class="campaign-media" aria-hidden="true"></div>
            <span class="campaign-label typo-util">Research Lab Showcase</span>
          </a>

          <!-- Project Card 3: Patient Care -->
          <a class="campaign-card tone-3" href="#" role="listitem">
            <div class="campaign-media" aria-hidden="true"></div>
            <span class="campaign-label typo-util">Patient Care Center</span>
          </a>
        </div>
      </div>
    </section>

  </main>

<div id="site-footer"></div>

  <!-- JS -->
  <script src="js/shared-header.js" defer></script>
  <script src="js/shared-footer.js" defer></script>
  <script src="js/header.js" defer></script>

</body>
</html>
