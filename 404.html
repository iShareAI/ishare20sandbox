<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found</title>
  <script>
    (function () {
      var badPaths = ["/home", "/index", "/main", "/home/", "/index/", "/main/"];
      var path = window.location.pathname.toLowerCase();
      if (badPaths.indexOf(path) !== -1) {
        window.location.replace("/");
      }
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f4f4f5;
      color: #111827;
    }
    main {
      text-align: center;
      padding: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
    }
    a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>The page you requested was not found.</p>
    <a href="/">Go to homepage</a>
  </main>
</body>
</html>
