<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iShare 360 Viewer</title>
  <style>
    :root {
      --bg: #060b14;
      --panel: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #84cc16;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Plus Jakarta Sans", "Inter", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 0%, #172554 0%, var(--bg) 48%);
      color: var(--text);
    }

    .shell {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .badge {
      border: 1px solid rgba(132, 204, 22, 0.55);
      color: var(--accent);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .viewer-wrap {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 14px;
      display: grid;
    }

    .viewer-frame {
      border: 0;
      width: 100%;
      height: calc(100vh - 126px);
      min-height: 520px;
      border-radius: 14px;
      background: #000;
      box-shadow: 0 16px 44px rgba(2, 6, 23, 0.55);
    }

    .error {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 110px);
      padding: 20px;
      text-align: center;
      color: var(--muted);
      line-height: 1.55;
    }

    @media (max-width: 768px) {
      .viewer-wrap { padding: 10px; }
      .viewer-frame {
        height: calc(100vh - 136px);
        min-height: 420px;
        border-radius: 10px;
      }
      .badge { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="shell" id="shell"></div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = (params.get("id") || "").trim();
      const safeId = /^[A-Za-z0-9]+$/.test(id) ? id : "";
      const shell = document.getElementById("shell");

      if (!safeId) {
        shell.innerHTML =
          '<div class="topbar"><div class="brand">iShare <span class="badge">360 Viewer</span></div></div>' +
          '<main class="error">Panorama link is invalid or missing.<br />Please return to the iShare page and open the panorama again.</main>';
        return;
      }

      const src = "https://app.seekbeak.com/v/" + safeId;
      shell.innerHTML =
        '<header class="topbar">' +
          '<div class="brand">iShare <span class="badge">360 Viewer</span></div>' +
          '<a href="javascript:history.back()" aria-label="Back" style="color:#e2e8f0;text-decoration:none;font-weight:600;">Back</a>' +
        '</header>' +
        '<main class="viewer-wrap">' +
          '<iframe class="viewer-frame" title="iShare 360 Panorama" src="' + src + '" loading="eager" allow="accelerometer; gyroscope; fullscreen; xr-spatial-tracking" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>' +
        '</main>';
    })();
  </script>
</body>
</html>
